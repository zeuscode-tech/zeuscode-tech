name: Interactive profile chess

on:
  issues:
    types: [opened]
  workflow_dispatch:

concurrency:
  group: profile-chess
  cancel-in-progress: false

jobs:
  play:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, 'chess|')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-chess.txt

      - name: Install chess engine
        run: python -m pip install --disable-pip-version-check -r requirements-chess.txt

      - name: Test chess engine
        run: python -m unittest discover -s tests -v

      - name: Process move
        id: chess
        env:
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_ACTOR: ${{ github.event.issue.user.login }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            python scripts/chess_profile.py render --repository "$REPOSITORY" --owner "$REPOSITORY_OWNER"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "message<<CHESS_MESSAGE"
              echo "♟️ Доска перегенерирована."
              echo "CHESS_MESSAGE"
            } >> "$GITHUB_OUTPUT"
          else
            python scripts/chess_profile.py play \
              --title "$ISSUE_TITLE" \
              --actor "$ISSUE_ACTOR" \
              --repository "$REPOSITORY" \
              --owner "$REPOSITORY_OWNER"
          fi

      - name: Commit updated position
        if: steps.chess.outputs.changed == 'true'
        env:
          ACTOR: ${{ github.event.issue.user.login || github.actor }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md chess/board.svg chess/state.json
          if ! git diff --cached --quiet; then
            git commit -m "chess: apply move by ${ACTOR}"
            git push
          fi

      - name: Reply and close move issue
        if: github.event_name == 'issues' && always() && steps.chess.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          MESSAGE: ${{ steps.chess.outputs.message }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$MESSAGE"
          gh issue close "$ISSUE_NUMBER"
